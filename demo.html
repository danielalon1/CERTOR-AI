<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certor™ Demo</title>

<link rel="stylesheet" href="assets/css/styles.css?v=21">

</head>

<body>

<header class="site-header">
  <div class="container header-inner">

    <div class="brand">
      <img src="./certor-logo.png?v=21" class="brand-logo">
      <div>
        <div class="brand-title">Certor™</div>
        <div class="brand-subtitle">Authority Before Execution</div>
      </div>
    </div>

    <nav class="nav">
      <a href="portal.html">Portal</a>
      <a href="papers.html">Research</a>
      <a href="mvp.html">MVP</a>
      <a href="demo.html" class="active">Demo</a>
      <a href="signals.html">Signals</a>
      <a href="about.html">About</a>
    </nav>

  </div>
</header>

<main class="container">

  <section class="hero">

    <div class="hero-grid">

      <div>
        <div class="eyebrow">Live System</div>

        <h1 class="hero-title">
          Certor decides before execution.
        </h1>

        <p class="hero-copy">
          This is a real authorization flow. No simulation. No bypass.
        </p>

        <button class="btn-primary" onclick="runDemo()">
          Run Live Demo
        </button>

        <div id="status" class="status-box">Idle</div>
      </div>

      <div class="hero-media">
        <div class="hero-card">
          <img src="demo-ai.png?v=21">
        </div>
      </div>

    </div>

  </section>

  <!-- RESULTS -->
  <section>

    <div class="result-card">

      <div class="row">
        <span>Decision</span>
        <span id="decision" class="badge">-</span>
      </div>

      <div class="row">
        <span>Execution</span>
        <span id="execution" class="badge">-</span>
      </div>

      <div class="row">
        <span>Reason</span>
        <span id="reason">-</span>
      </div>

      <div class="row">
        <span>Trace</span>
        <span id="trace">-</span>
      </div>

    </div>

  </section>

</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <div>Certor Technologies Ltd.</div>
    <div>© 2026 Daniel Alon</div>
  </div>
</footer>

<script>
async function runDemo(){

  const status = document.getElementById("status");
  const decisionEl = document.getElementById("decision");
  const executionEl = document.getElementById("execution");
  const reasonEl = document.getElementById("reason");
  const traceEl = document.getElementById("trace");

  status.innerText = "Processing...";
  status.style.color = "#ffb300";

  try {

    const res = await fetch("http://127.0.0.1:8100/demo/run", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        request_id: crypto.randomUUID(),
        actor: "web_demo",
        intent: "send_email",
        payload: {
          resource: "demo@example.com"
        }
      })
    });

    const data = await res.json();

    const decision = data.decision.decision;
    const execution = data.execution.status;

    // Decision UI
    decisionEl.innerText = decision;
    decisionEl.className = "badge " +
      (decision === "PERMIT" ? "permit" :
       decision === "BLOCK" ? "block" : "defer");

    // Execution UI
    executionEl.innerText = execution;
    executionEl.className = "badge exec";

    reasonEl.innerText = data.decision.reason_code;

    // Mask trace (Viewer Mode)
    traceEl.innerText = data.decision.trace_id.slice(0,10) + "...";

    status.innerText = "Completed";
    status.style.color = "#00ffa3";

  } catch (err){
    status.innerText = "Connection Error";
    status.style.color = "#ff4d4d";
  }
}
</script>

</body>
</html>
